version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - revive
    - gocritic

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true

  revive:
    rules:
      - name: exported

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

issues:
  max-issues-per-linter: 0
  max-same-issues: 0